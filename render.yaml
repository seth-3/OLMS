services:
  # Web Service
  - type: web
    name: olms-server
    env: node
    rootDir: server
    buildCommand: "npm install --include=dev && npm run build"
    startCommand: "npm start"
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
